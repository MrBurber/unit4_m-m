  { id:1, cat:'arch', title:'Introduction to 8051 Microcontroller', content:`
    <div class="section"><h3>What is the 8051?</h3>
    <p>The <strong style="color:#00c8ff">8051</strong> is an <strong style="color:#00c8ff">8-bit microcontroller</strong> developed by <strong style="color:#00c8ff">Intel in 1981</strong>, belonging to the MCS-51 family. It integrates CPU, RAM, ROM, I/O ports, and timers on a single chip — making it ideal for embedded systems.</p></div>
    <div class="section"><h3>Key Specifications</h3>
    <table>
      <tr><th>Feature</th><th>Specification</th></tr>
      <tr><td>CPU</td><td>8-bit</td></tr>
      <tr><td>Internal ROM</td><td>4 KB (Program Memory)</td></tr>
      <tr><td>Internal RAM</td><td>128 bytes (Data Memory)</td></tr>
      <tr><td>I/O Ports</td><td>32 pins — 4 ports (P0–P3)</td></tr>
      <tr><td>Timers</td><td>2 × 16-bit (T0, T1)</td></tr>
      <tr><td>Serial Port</td><td>1 UART (full-duplex)</td></tr>
      <tr><td>Interrupts</td><td>5 sources</td></tr>
      <tr><td>Clock</td><td>Up to 12 MHz → 1 µs/machine cycle</td></tr>
    </table></div>
    <div class="section"><h3>Why 8051?</h3>
    <ul><li>Simple, well-documented architecture — ideal for learning</li>
    <li>Huge industry adoption and legacy support</li>
    <li>Many derivatives: AT89S52, DS89C420, P89V51, etc.</li></ul></div>
    <div class="section"><h3>Applications</h3>
    <div><span class="tag">Home Appliances</span><span class="tag">Industrial Control</span><span class="tag">Robotics</span><span class="tag">Automobiles</span><span class="tag">Medical Devices</span><span class="tag">Consumer Electronics</span></div></div>
  `},
  { id:2, cat:'arch', title:'Architecture of 8051', content:`
    <div class="section"><h3>Block Diagram — Major Units</h3>
    <ul>
      <li><strong style="color:#00c8ff">CPU</strong> — Arithmetic Logic Unit (ALU) + Control Unit + Register Array</li>
      <li><strong style="color:#00c8ff">Program Memory (ROM)</strong> — 4KB internal; expandable to 64KB external via EA pin</li>
      <li><strong style="color:#00c8ff">Data Memory (RAM)</strong> — 128 bytes internal; expandable to 64KB external</li>
      <li><strong style="color:#00c8ff">I/O Ports</strong> — P0, P1, P2, P3 (8 bits each = 32 pins total)</li>
      <li><strong style="color:#00c8ff">Timers/Counters</strong> — Timer 0 and Timer 1 (16-bit each)</li>

      <li><strong style="color:#00c8ff">Interrupt Controller</strong> — 5 interrupt sources</li>
      <li><strong style="color:#00c8ff">Bus</strong> — 8-bit Data Bus + 16-bit Address Bus</li>
      <li><strong style="color:#00c8ff">Oscillator</strong> — Internal clock circuit (requires external crystal)</li>
    </ul></div>
    <div class="section"><h3>Harvard Architecture</h3>
    <p>The 8051 uses <strong style="color:#00c8ff">Modified Harvard Architecture</strong>: separate address spaces for Program Memory and Data Memory, allowing simultaneous instruction fetch and data access for better performance.</p></div>

      <tr><td>Data (RAM)</td><td>128 bytes (00H–7FH)</td><td>64 KB</td><td>RD, WR</td></tr>

    <div class="section"><h3>Pin Configuration (40-pin DIP)</h3>
    <ul>
      <li>VCC (Pin 40), GND (Pin 20)</li>
      <li>XTAL1/XTAL2 (Pin 18, 19) — Crystal oscillator</li>

Bit 4: RS1 — Register bank select bit 1  ┐ Select active

    <div class="section"><h3>Addition</h3>
    <pre>ADD  A, Rn        ; A = A + Rn         (sets CY, AC, OV, P)
ADD  A, direct    ; A = A + RAM[direct]
ADD  A, @Ri       ; A = A + RAM[Ri]
ADD  A, #data     ; A = A + immediate
ADDC A, src       ; A = A + src + CY    (add with carry — for 16-bit+ addition)</pre></div>
    <div class="section"><h3>Subtraction</h3>
    <pre>SUBB A, Rn        ; A = A - Rn - CY    (subtract with borrow)
SUBB A, direct    ; A = A - RAM[direct] - CY
SUBB A, @Ri       ; A = A - RAM[Ri] - CY
SUBB A, #data     ; A = A - data - CY

INC  Rn           ; Rn = Rn + 1
INC  direct       ; RAM[direct]++
INC  @Ri          ; RAM[Ri]++
INC  DPTR         ; DPTR = DPTR + 1  (16-bit!)
DEC  A            ; A = A - 1
DEC  Rn / direct / @Ri</pre></div>

ORL A, src        ; A = A OR  src   (setting bits)
XRL A, src        ; A = A XOR src   (toggling bits)
CPL A             ; A = ~A          (invert all bits)
CLR A             ; A = 00H

ANL direct, A     ; RAM[direct] &= A
ANL direct, #data ; RAM[direct] &= data
ORL direct, A     ; RAM[direct] |= A
ORL direct, #data ; RAM[direct] |= data
XRL direct, A     ; RAM[direct] ^= A</pre></div>
    <div class="section"><h3>Rotate Instructions</h3>
    <pre>RL  A    ; Rotate Left  (bit7 → bit0, rest shift left)
          ;   7←6←5←4←3←2←1←0←7

RR  A    ; Rotate Right (bit0 → bit7, rest shift right)
          ;   0→1→2→3→4→5→6→7→0

RLC A    ; Rotate Left through Carry
          ;   CY←7←6←...←0←CY  (9-bit rotate)

RRC A    ; Rotate Right through Carry
          ;   CY→7→...→0→CY     (9-bit rotate)</pre></div>
    <div class="section"><h3>Nibble Swap</h3>
    <pre>SWAP A   ; A[7:4] ↔ A[3:0]  (exchange upper and lower nibbles)
          ; Useful for BCD and packed data operations</pre></div>
    <div class="section"><h3>Bit Manipulation</h3>
    <pre>SETB bit  ; Set bit = 1
CLR  bit  ; Clear bit = 0
CPL  bit  ; Complement bit (toggle)
ANL  C, bit    ; CY = CY AND bit
ANL  C, /bit   ; CY = CY AND (NOT bit)
ORL  C, bit    ; CY = CY OR bit
ORL  C, /bit   ; CY = CY OR (NOT bit)
MOV  C, bit    ; CY ← bit
MOV  bit, C    ; bit ← CY</pre></div>
  `},
  { id:10, cat:'instr', title:'Control Transfer Instructions', content:`
    <div class="section"><h3>Unconditional Jumps</h3>
    <table>
      <tr><th>Instruction</th><th>Range</th><th>Bytes</th><th>Use</th></tr>
      <tr><td>LJMP addr16</td><td>Full 64KB</td><td>3</td><td>Jump anywhere</td></tr>
      <tr><td>AJMP addr11</td><td>2KB page</td><td>2</td><td>Jump within same 2KB block</td></tr>
      <tr><td>SJMP rel</td><td>±128 bytes</td><td>2</td><td>Short relative jump (loops)</td></tr>
      <tr><td>JMP @A+DPTR</td><td>—</td><td>1</td><td>Indirect jump via table (switch-case)</td></tr>
    </table></div>
    <div class="section"><h3>Conditional Jumps (all relative, ±128 bytes)</h3>
    <pre>JZ   rel       ; Jump if A == 0
JNZ  rel       ; Jump if A != 0
JC   rel       ; Jump if CY == 1
JNC  rel       ; Jump if CY == 0
JB   bit, rel  ; Jump if bit == 1
JNB  bit, rel  ; Jump if bit == 0
JBC  bit, rel  ; Jump if bit==1, then CLEAR the bit

CJNE A, #data, rel   ; Jump if A != #data  (also sets CY if A < data)
CJNE A, direct, rel  ; Jump if A != direct
CJNE Rn, #data, rel  ; Jump if Rn != data
CJNE @Ri, #data, rel ; Jump if RAM[Ri] != data

DJNZ Rn, rel         ; Rn--; Jump if Rn != 0  (loop counter)
DJNZ direct, rel     ; direct--; Jump if != 0</pre></div>
    <div class="section"><h3>Subroutine Calls & Returns</h3>
    <pre>LCALL addr16  ; Long call: push PC to stack, jump to addr16
ACALL addr11  ; Absolute call (11-bit address, within same 2KB page)
RET           ; Pop PC from stack, return to caller
RETI          ; Return from interrupt (also clears interrupt in-service flag)</pre></div>
    <div class="section"><h3>No Operation</h3>
    <pre>NOP           ; Do nothing for 1 machine cycle (used for timing delays)</pre></div>
  `},
  { id:11, cat:'periph', title:'Timer & Counter Programming', content:`
    <div class="section"><h3>TMOD Register (89H) — Not Bit-Addressable</h3>
    <pre>Bits 7–4: Timer 1 settings   |   Bits 3–0: Timer 0 settings
[ GATE  C/T  M1  M0 ]  |  [ GATE  C/T  M1  M0 ]

GATE: 1 = Timer runs only when INT pin is HIGH (hardware control)
      0 = Timer runs when TR bit is set (software control)
C/T:  0 = Timer mode (counts internal clock / 12)
      1 = Counter mode (counts falling edges on T0/T1 pin)
M1 M0 → Mode:
 0  0  = Mode 0: 13-bit timer (8-bit + 5-bit prescaler)
 0  1  = Mode 1: 16-bit timer ← MOST COMMONLY USED
 1  0  = Mode 2: 8-bit auto-reload (TH reloaded into TL on overflow)
 1  1  = Mode 3: Timer 0 split into two 8-bit timers; Timer 1 halted</pre></div>
    <div class="section"><h3>TCON Register (88H) — Bit-Addressable</h3>
    <pre>Bit 7: TF1 — Timer 1 overflow flag (auto-cleared on ISR entry)
Bit 6: TR1 — Timer 1 run control (1=ON, 0=OFF)
Bit 5: TF0 — Timer 0 overflow flag
Bit 4: TR0 — Timer 0 run control
Bit 3: IE1 — External INT1 edge flag
Bit 2: IT1 — INT1 trigger type (1=edge, 0=level)
Bit 1: IE0 — External INT0 edge flag
Bit 0: IT0 — INT0 trigger type</pre></div>
    <div class="section"><h3>Timer Delay Calculation — Mode 1 (16-bit)</h3>
    <pre>At 12 MHz → Machine cycle = 12/12MHz = 1 µs
Count needed for delay T = T / 1µs
Initial value = 65536 − Count
TH = Initial_value / 256  (High byte)
TL = Initial_value MOD 256 (Low byte)

Example: 50 ms delay at 12 MHz
  Count = 50,000
  Initial = 65536 − 50000 = 15536 = 3CB0H
  → TH0 = 3CH,  TL0 = B0H</pre></div>
    <div class="section"><h3>Timer Programming Template</h3>
    <pre>MOV TMOD, #01H   ; Timer 0, Mode 1, timer mode
MOV TH0, #3CH    ; Load initial count (50ms delay)
MOV TL0, #0B0H
SETB TR0         ; Start Timer 0
HERE: JNB TF0, HERE  ; Wait for overflow
CLR TR0          ; Stop timer
CLR TF0          ; Clear flag</pre></div>
    <div class="section"><h3>Mode 2 — Auto-Reload (Baud Rate Generation)</h3>
    <pre>TH1 holds the reload value
When TL1 overflows → TL1 is automatically reloaded from TH1
Used for generating precise baud rates for UART</pre></div>
  `},
  { id:12, cat:'periph', title:'Interrupt Programming', content:`
    <div class="section"><h3>Interrupt Sources & Vectors</h3>
    <table>
      <tr><th>Source</th><th>Flag</th><th>Vector</th><th>Default Priority</th></tr>
      <tr><td>External INT0 (P3.2)</td><td>IE0</td><td>0003H</td><td>1 (Highest)</td></tr>
      <tr><td>Timer 0 overflow</td><td>TF0</td><td>000BH</td><td>2</td></tr>
      <tr><td>External INT1 (P3.3)</td><td>IE1</td><td>0013H</td><td>3</td></tr>
      <tr><td>Timer 1 overflow</td><td>TF1</td><td>001BH</td><td>4</td></tr>
      <tr><td>Serial Port (RXD/TXD)</td><td>RI / TI</td><td>0023H</td><td>5 (Lowest)</td></tr>
    </table></div>
    <div class="section"><h3>IE Register (A8H) — Interrupt Enable</h3>
    <pre>Bit 7: EA  — Global interrupt enable (MUST be 1 to enable any interrupt)
Bit 6: —   (reserved)
Bit 5: ET2 — Enable Timer 2 (8052 only)
Bit 4: ES  — Enable Serial port interrupt
Bit 3: ET1 — Enable Timer 1 interrupt
Bit 2: EX1 — Enable External INT1
Bit 1: ET0 — Enable Timer 0 interrupt
Bit 0: EX0 — Enable External INT0

Example: MOV IE, #83H  → EA=1, ET0=1, EX0=1</pre></div>
    <div class="section"><h3>IP Register (B8H) — Interrupt Priority</h3>
    <pre>Same bit layout as IE (bits 0–5)
0 = Low priority group
1 = High priority group
High priority ISRs can interrupt low priority ISRs (two-level nesting)</pre></div>
    <div class="section"><h3>External Interrupt Triggering</h3>
    <pre>IT0 (TCON.0) = 0 → Level triggered (INT0 active while pin is LOW)
IT0 (TCON.0) = 1 → Edge triggered (INT0 on falling edge)</pre></div>
    <div class="section"><h3>Complete ISR Example</h3>
    <pre>ORG 0000H
    LJMP MAIN          ; Reset → jump to main program

ORG 0003H              ; INT0 interrupt vector
    LJMP INT0_ISR      ; Jump to ISR

ORG 000BH              ; Timer 0 vector
    LJMP TIMER0_ISR

ORG 0030H
MAIN:
    MOV SP, #60H       ; Relocate stack
    SETB IT0           ; INT0 = edge triggered
    MOV IE, #83H       ; Enable EA, ET0, EX0
    SJMP $             ; Idle loop

INT0_ISR:
    ; ... handle INT0 ...
    RETI               ; Must use RETI, not RET!

TIMER0_ISR:
    ; ... reload timer, handle overflow ...
    RETI</pre></div>
  `},
  { id:13, cat:'periph', title:'Serial (UART) Communication', content:`
    <div class="section"><h3>SCON Register (98H) — Serial Control</h3>
    <pre>Bit 7: SM0 ─┐ Serial Mode select
Bit 6: SM1 ─┘
Bit 5: SM2  — Multiprocessor communication bit
Bit 4: REN  — Receiver Enable (1 = allow reception)
Bit 3: TB8  — 9th transmit bit (Mode 2/3)
Bit 2: RB8  — 9th received bit (Mode 2/3)
Bit 1: TI   — Transmit Interrupt flag (set when byte sent; must CLR TI)
Bit 0: RI   — Receive Interrupt flag (set when byte received; must CLR RI)</pre></div>
    <div class="section"><h3>Serial Modes</h3>
    <table>
      <tr><th>SM0 SM1</th><th>Mode</th><th>Description</th><th>Baud Rate</th></tr>
      <tr><td>0 0</td><td>Mode 0</td><td>Shift Register (synchronous)</td><td>f_osc / 12</td></tr>
      <tr><td>0 1</td><td>Mode 1</td><td>8-bit UART (most common)</td><td>Timer 1 (variable)</td></tr>
      <tr><td>1 0</td><td>Mode 2</td><td>9-bit UART</td><td>f_osc/32 or f_osc/64</td></tr>
      <tr><td>1 1</td><td>Mode 3</td><td>9-bit UART (variable baud)</td><td>Timer 1 (variable)</td></tr>
    </table></div>
    <div class="section"><h3>Baud Rate Setup (Mode 1 with 11.0592 MHz crystal)</h3>
    <pre>Timer 1 in Mode 2 (auto-reload), SMOD=0:
  Baud = f_osc / (32 × 12 × (256 − TH1))

Common baud rates at 11.0592 MHz:
  9600  baud → TH1 = FDH
  4800  baud → TH1 = FAH
  2400  baud → TH1 = F4H

Setup code:
  MOV TMOD, #20H   ; Timer 1, Mode 2
  MOV TH1,  #0FDH  ; 9600 baud
  MOV TL1,  #0FDH
  SETB TR1         ; Start Timer 1
  MOV SCON, #50H   ; Mode 1, REN=1</pre></div>
    <div class="section"><h3>Transmit & Receive Routines</h3>
    <pre>; --- Transmit byte in A ---
SEND_CHAR:
    MOV SBUF, A       ; Load byte into serial buffer
    JNB TI, $         ; Wait until transmission complete
    CLR TI            ; Clear flag (required!)
    RET

; --- Receive byte into A ---
RECV_CHAR:
    JNB RI, $         ; Wait for received byte
    MOV A, SBUF       ; Read received byte
    CLR RI            ; Clear flag (required!)
    RET</pre></div>
  `},
  { id:14, cat:'prog', title:'Programming 8051 — Tools & Concepts', content:`
    <div class="section"><h3>Development Workflow</h3>
    <ul>
      <li><strong style="color:#00c8ff">Write</strong> assembly source (.asm) in a text editor or IDE</li>
      <li><strong style="color:#00c8ff">Assemble</strong> using ASM51 / Keil µVision → generates .hex file (Intel Hex Format)</li>
      <li><strong style="color:#00c8ff">Simulate</strong> using Proteus or 8051 emulator for debugging</li>
      <li><strong style="color:#00c8ff">Program</strong> the chip using a device programmer (burns .hex to ROM)</li>
    </ul></div>
    <div class="section"><h3>Assembler Directives</h3>
    <table>
      <tr><th>Directive</th><th>Syntax</th><th>Purpose</th></tr>
      <tr><td>ORG</td><td>ORG 0000H</td><td>Set current address counter</td></tr>
      <tr><td>DB</td><td>MSG: DB "Hello", 0</td><td>Define byte(s) / string</td></tr>
      <tr><td>DW</td><td>TABLE: DW 1234H</td><td>Define word (2 bytes)</td></tr>
      <tr><td>EQU</td><td>DELAY EQU 0FFH</td><td>Define constant (no memory allocated)</td></tr>
      <tr><td>BIT</td><td>LED BIT P1.0</td><td>Define bit label</td></tr>
      <tr><td>END</td><td>END</td><td>End of source file</td></tr>
    </table></div>
    <div class="section"><h3>Standard Program Template</h3>
    <pre>; ============= 8051 PROGRAM TEMPLATE =============
        ORG 0000H
        LJMP MAIN          ; Skip interrupt vectors

; --- Interrupt Vectors (if used) ---
        ORG 0003H
        LJMP INT0_ISR

        ORG 000BH
        LJMP TIMER0_ISR

; --- Main Program ---
        ORG 0030H
MAIN:
        MOV SP, #60H       ; Set stack to upper RAM
        MOV IE, #00H       ; Disable all interrupts initially
        ; Initialize ports, timers, UART here...

LOOP:
        ; Main application code
        SJMP LOOP          ; Infinite main loop

; --- ISR Handlers ---
INT0_ISR:   RETI
TIMER0_ISR: RETI

        END</pre></div>
    <div class="section"><h3>Key Programming Tips</h3>
    <ul>
      <li>Always <strong style="color:#00c8ff">CLR TI / CLR RI</strong> after serial operations — not auto-cleared</li>
      <li>Use <strong style="color:#00c8ff">RETI</strong> (not RET) in interrupt service routines</li>
      <li>INC does NOT affect CY — use ADDC for multi-byte addition</li>
      <li>No plain SUB instruction — use CLR C then SUBB</li>
      <li>DJNZ is the preferred loop instruction (single-instruction decrement+branch)</li>
      <li>Relocate SP away from register banks if using deep stacks</li>
    </ul></div>
  `}
];

let currentFilter = 'all';

function renderTopics(filter) {
  currentFilter = filter;
  const container = document.getElementById('topicsList');
  container.innerHTML = '';
  const list = filter === 'all' ? topics : topics.filter(t => t.cat === filter);
  list.forEach(t => {
    const card = document.createElement('div');
    card.className = 'topic-card visible';
    card.id = 'topic-' + t.id;
    card.innerHTML = `
      <div class="topic-header" onclick="toggleTopic(${t.id})">
        <span class="topic-num">T-${String(t.id).padStart(2,'0')}</span>
        <span class="topic-title">${t.title}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="topic-body">${t.content}</div>
    `;
    container.appendChild(card);
  });
  updateProgress();
}

function toggleTopic(id) {
  const card = document.getElementById('topic-' + id);
  if (card) card.classList.toggle('open');
  updateProgress();
}

function expandAll() {
  document.querySelectorAll('.topic-card').forEach(c => c.classList.add('open'));
  updateProgress();
}

function collapseAll() {
  document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('open'));
  updateProgress();
}

function filterTopics(cat, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTopics(cat);
}

function updateProgress() {
  const total = document.querySelectorAll('.topic-card').length;
  const opened = document.querySelectorAll('.topic-card.open').length;
  const pct = total ? Math.round(opened / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent = `${opened} / ${total} topics opened`;
}

renderTopics('all');
</script>
